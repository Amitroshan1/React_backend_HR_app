<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect x="0" y="0" width="300" height="300" fill="#ffffff"/>

  <!-- Outer diamond -->
  <polygon points="150,30 270,150 150,270 30,150" fill="none" stroke="#2b2b2b" stroke-width="4"/>

  <!-- Main center axes -->
  <line x1="150" y1="30" x2="150" y2="270" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="30" y1="150" x2="270" y2="150" stroke="#2b2b2b" stroke-width="4"/>

  <!-- Left inner block -->
  <line x1="90" y1="90" x2="90" y2="210" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="30" y1="150" x2="150" y2="150" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="90" y1="90" x2="150" y2="150" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="90" y1="210" x2="150" y2="150" stroke="#2b2b2b" stroke-width="4"/>

  <!-- Right inner block -->
  <line x1="210" y1="90" x2="210" y2="210" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="150" y1="150" x2="270" y2="150" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="210" y1="90" x2="150" y2="150" stroke="#2b2b2b" stroke-width="4"/>
  <line x1="210" y1="210" x2="150" y2="150" stroke="#2b2b2b" stroke-width="4"/>
</svg>
